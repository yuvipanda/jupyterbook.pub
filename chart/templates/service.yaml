apiVersion: v1
kind: Service
metadata:
  name: {{ include "jupyterbook-pub.app.fullname" . }}
  labels:
    {{- include "jupyterbook-pub.labels" . | nindent 4 }}
    {{- with .Values.service.annotations }}
  annotations:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    {{- include "jupyterbook-pub.selectorLabels" . | nindent 4 }}
