{{- /*
  Changes to this rendered manifest triggers a restart of the jupyterbook_pub
  pod as the pod specification includes an annotation with a checksum of this.
*/ -}}
kind: Secret
apiVersion: v1
metadata:
  name: {{ include "jupyterbook-pub.app.fullname" . }}
  labels:
    {{- include "jupyterbook-pub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /*
    To restart the jupyterbook_pub pod only when relevant, we pick out the
    chart configuration actually consumed in the mounted jupyterbook_pub_config.py
    file.
  */}}
  chart-config.yaml: |
    {{- pick .Values "custom" "config" "extraConfig" | toYaml | nindent 4 }}

  {{- /* Glob files to allow them to be mounted by the jupyterbook_pub pod */}}
  {{- /* key=filename: value=content */}}
  {{- (.Files.Glob "mounted-files/*").AsConfig | nindent 2 }}
